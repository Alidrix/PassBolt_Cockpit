<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passbolt CSV Import</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="wrap">
    <h2>Passbolt CSV Importer</h2>
    <p class="muted">CSV supporté: <code>email,firstname,lastname,role</code> ou <code>email,firstname,lastname,role,groups</code> avec groupes séparés par <code>;</code>.</p>

    <div class="card">
      <input type="file" id="file" accept=".csv" />
      <label><input type="checkbox" id="rollbackOnError" /> Rollback si erreur</label>
      <div style="margin-top: 10px;">
        <button id="previewBtn">Prévisualiser</button>
        <button id="uploadBtn">Importer</button>
      </div>
      <div class="progress"><div id="bar" class="bar"></div></div>
      <div class="progress-meta">
        <span id="progressPercent">0%</span>
        <span id="progressStage" class="stage">Prévalidation</span>
      </div>
      <p id="summary" class="muted"></p>
      <h3>Logs</h3>
      <div id="logs" class="logs"></div>
    </div>

    <div class="card">
      <h3>Prévisualisation</h3>
      <table>
        <thead>
          <tr><th>Ligne</th><th>Email</th><th>Prénom</th><th>Nom</th><th>Rôle</th><th>Groupes</th><th>Validité</th><th>Erreurs</th></tr>
        </thead>
        <tbody id="previewRows"></tbody>
      </table>
    </div>

    <div class="card grid-two">
      <div>
        <h3>Résultats import</h3>
        <table>
          <thead><tr><th>Email</th><th>Status</th><th>Groupes demandés</th><th>Détails</th></tr></thead>
          <tbody id="results"></tbody>
        </table>
      </div>
      <div>
        <h3>Résumé final</h3>
        <ul id="finalSummary" class="summary-list"></ul>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script src="/script.js"></script>
</body>
</html>
